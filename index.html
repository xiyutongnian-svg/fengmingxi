<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鐝骇璇峰亣绠＄悊绯荤粺 - 鐧诲綍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 400px;
            max-width: 90%;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #2c5aa0;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2c5aa0;
        }
        
        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .role-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .role-option:hover {
            border-color: #2c5aa0;
        }
        
        .role-option.active {
            border-color: #2c5aa0;
            background: #f0f5ff;
        }
        
        .role-option i {
            font-size: 30px;
            margin-bottom: 8px;
            display: block;
        }
        
        .role-option span {
            font-size: 14px;
            color: #333;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #2c5aa0;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .login-btn:hover {
            background: #1e4080;
        }
        
        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .tips {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            font-size: 13px;
            color: #666;
        }
        
        .tips h3 {
            color: #2c5aa0;
            margin-bottom: 8px;
        }
        
        .tips p {
            margin: 5px 0;
        }
        
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>鐝骇璇峰亣绠＄悊绯荤粺</h1>
            <p>璇烽€夋嫨韬唤骞剁櫥褰?/p>
        </div>
        
        <div class="alert alert-error" id="errorMsg"></div>
        <div class="alert alert-success" id="successMsg"></div>
        
        <div class="role-selector">
            <div class="role-option active" data-role="student">
                <i>馃懆鈥嶐煄?/i>
                <span>瀛︾敓鐧诲綍</span>
            </div>
            <div class="role-option" data-role="teacher">
                <i>馃懆鈥嶐煆?/i>
                <span>鏁欏笀鐧诲綍</span>
            </div>
        </div>
        
        <form id="loginForm">
            <input type="hidden" id="role" value="student">
            
            <div class="form-group">
                <label for="username">璐﹀彿</label>
                <input type="text" id="username" placeholder="璇疯緭鍏ヨ处鍙? required>
            </div>
            
            <div class="form-group">
                <label for="password">瀵嗙爜</label>
                <input type="password" id="password" placeholder="璇疯緭鍏ュ瘑鐮? required>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">鐧诲綍</button>
        </form>
        
        <div class="tips">
            <h3>娴嬭瘯璐﹀彿</h3>
            <p><strong>瀛︾敓:</strong> student1 / 123456</p>
            <p><strong>鏁欏笀:</strong> teacher1 / 123456</p>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        
        document.querySelectorAll('.role-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
                option.classList.add('active');
                document.getElementById('role').value = option.dataset.role;
            });
        });
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = '鐧诲綍涓?..';
            
            hideAlerts();
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showAlert('success', '鐧诲綍鎴愬姛锛屾鍦ㄨ烦杞?..');
                    
                    setTimeout(() => {
                        if (role === 'student') {
                            window.location.href = 'student.html';
                        } else {
                            window.location.href = 'teacher.html';
                        }
                    }, 500);
                } else {
                    showAlert('error', data.message);
                    loginBtn.disabled = false;
                    loginBtn.textContent = '鐧诲綍';
                }
            } catch (error) {
                showAlert('error', '缃戠粶閿欒锛岃妫€鏌ユ湇鍔″櫒鏄惁鍚姩');
                loginBtn.disabled = false;
                loginBtn.textContent = '鐧诲綍';
            }
        });
        
        function showAlert(type, message) {
            const alert = document.getElementById(type === 'error' ? 'errorMsg' : 'successMsg');
            alert.textContent = message;
            alert.style.display = 'block';
        }
        
        function hideAlerts() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }
        
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        
        if (token && user) {
            if (user.role === 'student') {
                window.location.href = 'student.html';
            } else {
                window.location.href = 'teacher.html';
            }
        }
    </script>
</body>
</html>
